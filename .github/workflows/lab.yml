name: Lab Monitor Daily
on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 15 * * *'
concurrency:
  group: lab-monitor
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      TG_TOKEN: ${{ secrets.TG_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      VKTEAMS_TOKEN: ${{ secrets.VKTEAMS_TOKEN }}
      VKTEAMS_CHAT_ID: ${{ secrets.VKTEAMS_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openvpn curl
          pip install playwright
          python3 -m playwright install chromium --with-deps

      - name: Download VPN configs
        run: |
          python3 - <<'PYEOF'
          import urllib.request, re
          html = urllib.request.urlopen("https://vpnobratno.info/russia_server_list.html", timeout=15).read().decode("utf-8", "replace")
          links = re.findall(r'href="(https://vpnobratno\.info/servers/[^"]+_ip_udp\.ovpn)"', html)
          if not links:
              links = re.findall(r'href="(https://vpnobratno\.info/servers/[^"]+\.ovpn)"', html)
          for i, link in enumerate(links[:5]):
              urllib.request.urlretrieve(link, f"vpn{i}.ovpn")
              print(f"Downloaded vpn{i}.ovpn: {link}")
          if not links:
              print("No VPN configs found")
          PYEOF

      - name: Run monitor (все лабы, КДЛ через внутренний VPN)
        run: python3 -u lab_monitor.py

      - name: VPN + КДЛ content (с ретраями по VPN)
        run: |
          for f in vpn*.ovpn; do
            echo "=== Пробуем $f ==="
            sudo openvpn --config "$f" --daemon --log /tmp/vpn.log
            sleep 8
            IP=$(curl -s --max-time 8 https://api.ipify.org || echo "unknown")
            echo "IP: $IP"
            if python3 -c "import urllib.request; urllib.request.urlopen('https://kdl.ru/akcii', timeout=8)" 2>/dev/null; then
              echo "КДЛ доступен через $f"
              VPN_READY=1 VPN_ONLY=1 python3 -u content_monitor.py
              sudo pkill openvpn || true
              break
            fi
            echo "КДЛ недоступен через $f, пробуем следующий..."
            sudo pkill openvpn || true
            sleep 3
          done
          sudo pkill openvpn || true
        continue-on-error: true

      - name: Run content monitor (без КДЛ)
        run: python3 -u content_monitor.py

      - name: Build stats page
        run: python3 -u build_stats_html.py

      - name: Save files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin main
          python3 - <<'PYEOF'
          import json, subprocess
          for fname in ['seen_content.json', 'seen_promos.json']:
              try:
                  ours = json.load(open(fname))
                  remote_raw = subprocess.check_output(['git', 'show', 'FETCH_HEAD:' + fname]).decode()
                  remote = json.loads(remote_raw)
                  merged = dict(remote)
                  added = 0
                  for k, v in ours.items():
                      if k not in merged:
                          merged[k] = v
                          added += 1
                      elif isinstance(v, dict) and isinstance(merged[k], dict):
                          # локальный title перекрывает null из remote
                          if v.get('title') and not merged[k].get('title'):
                              merged[k] = v
                  with open(fname, 'w') as f:
                      json.dump(merged, f, ensure_ascii=False, indent=2)
                  print(f'{fname}: +{added} (итого {len(merged)})')
              except Exception as e:
                  print(f'merge {fname}: {e}')
          PYEOF
          git reset --soft FETCH_HEAD
          git add seen_promos.json seen_content.json stats.html || true
          git diff --staged --quiet && echo "nothing to commit" && exit 0
          git commit -m "update promos + content + stats"
          git push
