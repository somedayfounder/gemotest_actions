name: Lab Monitor Daily
on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 15 * * *'
concurrency:
  group: lab-monitor
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      TG_TOKEN: ${{ secrets.TG_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      VKTEAMS_TOKEN: ${{ secrets.VKTEAMS_TOKEN }}
      VKTEAMS_CHAT_ID: ${{ secrets.VKTEAMS_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y openvpn curl

      - name: Download VPN configs
        run: |
          python3 - <<'PYEOF'
          import urllib.request, re
          html = urllib.request.urlopen("https://vpnobratno.info/russia_server_list.html", timeout=15).read().decode("utf-8", "replace")
          links = re.findall(r'href="(https://vpnobratno\.info/servers/[^"]+_ip_udp\.ovpn)"', html)
          if not links:
              links = re.findall(r'href="(https://vpnobratno\.info/servers/[^"]+\.ovpn)"', html)
          for i, link in enumerate(links[:5]):
              urllib.request.urlretrieve(link, f"vpn{i}.ovpn")
              print(f"Downloaded vpn{i}.ovpn: {link}")
          if not links:
              print("No VPN configs found")
          PYEOF

      - name: Connect VPN
        run: |
          for f in vpn*.ovpn; do
            sudo openvpn --config "$f" --daemon --log /tmp/vpn.log
            sleep 8
            IP=$(curl -s --max-time 8 https://api.ipify.org || echo "unknown")
            echo "VPN $f → IP: $IP"
            if python3 -c "import urllib.request; urllib.request.urlopen('https://kdl.ru/', timeout=8)" 2>/dev/null; then
              echo "KDL accessible, VPN OK"
              break
            fi
            sudo pkill openvpn || true
            sleep 3
          done

      - name: Диагностика VPN + КДЛ
        run: |
          echo "=== External IP ==="
          curl -s --max-time 8 https://api.ipify.org || echo "IP check failed"
          echo ""
          echo "=== KDL reachability ==="
          curl -v --max-time 10 https://kdl.ru/ 2>&1 | head -40 || echo "KDL unreachable"
          echo ""
          echo "=== KDL press-center ==="
          curl -s --max-time 10 -o /dev/null -w "HTTP %{http_code} in %{time_total}s" https://kdl.ru/press-center/ || echo "press-center failed"
          echo ""
          echo "=== KDL blog ==="
          curl -s --max-time 10 -o /dev/null -w "HTTP %{http_code} in %{time_total}s" https://kdl.ru/blog/ || echo "blog failed"
        continue-on-error: true

      - name: Run КДЛ акции (VPN)
        run: KDL_ONLY=1 python3 -u lab_monitor.py
        continue-on-error: true

      - name: Run КДЛ content (VPN)
        run: VPN_READY=1 VPN_ONLY=1 python3 -u content_monitor.py
        continue-on-error: true

      - name: Disconnect VPN
        run: sudo pkill openvpn || true

      - name: Run monitor (без КДЛ)
        run: SKIP_KDL=1 python3 -u lab_monitor.py

      - name: Run content monitor (без КДЛ)
        run: python3 -u content_monitor.py

      - name: Build stats page
        run: python3 -u build_stats_html.py

      - name: Save files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin main
          python3 - <<'PYEOF'
          import json, subprocess
          for fname in ['seen_content.json', 'seen_promos.json']:
              try:
                  ours = json.load(open(fname))
                  remote_raw = subprocess.check_output(['git', 'show', 'FETCH_HEAD:' + fname]).decode()
                  remote = json.loads(remote_raw)
                  merged = dict(remote)
                  added = sum(1 for k, v in ours.items() if k not in merged and not merged.update({k: v}))
                  with open(fname, 'w') as f:
                      json.dump(merged, f, ensure_ascii=False, indent=2)
                  print(f'{fname}: +{added} (итого {len(merged)})')
              except Exception as e:
                  print(f'merge {fname}: {e}')
          PYEOF
          git reset --soft FETCH_HEAD
          git add seen_promos.json seen_content.json stats.html || true
          git diff --staged --quiet && echo "nothing to commit" && exit 0
          git commit -m "update promos + content + stats"
          git push
