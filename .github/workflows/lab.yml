name: Lab Monitor Daily
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 14 * * *'
permissions:
  contents: write
jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      TG_TOKEN: ${{ secrets.TG_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps
          sudo apt-get install -y openvpn dnsutils

      - name: Download VPN config
        run: |
          python3 - <<'PYEOF'
          import urllib.request, re
          html = urllib.request.urlopen("https://vpnobratno.info/russia_server_list.html", timeout=15).read().decode("utf-8", "replace")
          links = re.findall(r'href="(https://vpnobratno\.info/servers/[^"]+_ip_udp\.ovpn)"', html)
          if not links:
              links = re.findall(r'href="(https://vpnobratno\.info/servers/[^"]+\.ovpn)"', html)
          if links:
              urllib.request.urlretrieve(links[0], "vpn.ovpn")
              print("Downloaded:", links[0])
          else:
              print("No VPN config found")
          PYEOF

      - name: Connect VPN (route only RU labs)
        run: |
          if [ ! -f vpn.ovpn ]; then echo "No VPN config, skipping"; exit 0; fi
          # Добавляем route-nopull чтобы VPN не захватывал весь трафик
          echo "route-nopull" >> vpn.ovpn
          sudo openvpn --config vpn.ovpn --daemon --log /tmp/vpn.log
          sleep 10
          # Получаем gateway и интерфейс VPN
          VPN_GW=$(ip route | grep tun | awk '{print $3}' | head -1)
          VPN_IF=$(ip route | grep tun | awk '{print $5}' | head -1)
          echo "VPN_GW=$VPN_GW VPN_IF=$VPN_IF"
          if [ -n "$VPN_GW" ] && [ -n "$VPN_IF" ]; then
            # Маршруты только для KDL и Invitro
            for HOST in kdl.ru www.invitro.ru; do
              IP=$(dig +short $HOST | grep -E "^[0-9]+" | head -1)
              if [ -n "$IP" ]; then
                sudo ip route add $IP/32 via $VPN_GW dev $VPN_IF 2>/dev/null && echo "Route: $HOST -> $IP" || true
              fi
            done
          fi

      - name: Run monitor
        run: python3 lab_monitor.py

      - name: Disconnect VPN
        if: always()
        run: sudo pkill openvpn || true

      - name: Save seen promos
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen_promos.json || true
          git diff --staged --quiet && echo "nothing to commit" && exit 0
          git commit -m "update seen_promos"
          git push
