name: Lab Monitor Daily
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 14 * * *'
permissions:
  contents: write
jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      TG_TOKEN: ${{ secrets.TG_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps
          sudo apt-get install -y openvpn dnsutils curl

      - name: Download VPN configs
        run: |
          python3 - <<'PYEOF'
          import urllib.request, re
          html = urllib.request.urlopen("https://vpnobratno.info/russia_server_list.html", timeout=15).read().decode("utf-8", "replace")
          links = re.findall(r'href="(https://vpnobratno\.info/servers/[^"]+_ip_udp\.ovpn)"', html)
          if not links:
              links = re.findall(r'href="(https://vpnobratno\.info/servers/[^"]+\.ovpn)"', html)
          for i, link in enumerate(links[:5]):
              urllib.request.urlretrieve(link, f"vpn{i}.ovpn")
              print(f"Downloaded vpn{i}.ovpn: {link}")
          if not links:
              print("No VPN configs found")
          PYEOF

      - name: Connect VPN + bypass Telegram/OpenAI
        run: |
          ORIG_GW=$(ip route | grep '^default' | awk '{print $3}' | head -1)
          ORIG_IF=$(ip route | grep '^default' | awk '{print $5}' | head -1)
          echo "Original GW: $ORIG_GW via $ORIG_IF"
          echo "IP before VPN: $(curl -s --max-time 5 https://api.ipify.org || echo unknown)"

          VPN_OK=false
          for cfg in vpn0.ovpn vpn1.ovpn vpn2.ovpn vpn3.ovpn vpn4.ovpn; do
            [ -f "$cfg" ] || continue
            echo "Trying $cfg..."
            sudo openvpn --config "$cfg" --daemon --log /tmp/vpn.log
            sleep 15
            VPN_IP=$(curl -s --max-time 10 https://api.ipify.org || echo unknown)
            GEO=$(curl -s --max-time 5 "https://ipinfo.io/$VPN_IP/country" || echo unknown)
            echo "  IP: $VPN_IP  Country: $GEO"
            if [ "$GEO" = "RU" ]; then
              echo "VPN OK: $cfg -> $VPN_IP (RU)"
              VPN_OK=true
              break
            else
              echo "  Not RU, killing and trying next..."
              sudo pkill openvpn || true
              sleep 3
            fi
          done

          if [ "$VPN_OK" = "false" ]; then
            echo "WARNING: all VPN profiles failed, running without VPN"
          fi

          sudo tail -5 /tmp/vpn.log || true

          for HOST in api.telegram.org api.openai.com; do
            for IP in $(dig +short $HOST | grep -E '^[0-9]+'); do
              sudo ip route add $IP/32 via $ORIG_GW dev $ORIG_IF 2>/dev/null \
                && echo "Bypass VPN: $HOST -> $IP" || true
            done
          done

      - name: Inspect KDL page via Python
        run: |
          python3 - <<'PYEOF'
          import urllib.request, re
          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36",
              "Accept-Language": "ru-RU,ru;q=0.9",
              "Accept": "text/html,application/xhtml+xml",
          }
          req = urllib.request.Request("https://kdl.ru/akcii", headers=HEADERS)
          html = urllib.request.urlopen(req, timeout=20).read().decode("utf-8", "replace")
          print(f"=== KDL /akcii — len={len(html)} ===")
          # все ссылки на акции
          links = re.findall(r'href=["\']([^"\']*akcii[^"\']*)["\']', html)
          print(f"akcii links: {links[:30]}")
          # поиск slug-подобных путей
          slugs = re.findall(r'["\'/](akcii/[a-zA-Z0-9_\-]{3,})', html)
          print(f"akcii slugs: {slugs[:30]}")
          # window.__INITIAL_STATE__ или подобное
          for pattern in [r'window\.__[A-Z_]+__\s*=\s*(\{.*?\})\s*;', r'<script[^>]*id="__[A-Z_]+"[^>]*>(.*?)</script>']:
              m = re.search(pattern, html, re.DOTALL)
              if m:
                  print(f"embedded data: {m.group(1)[:500]}")
          # первые 3000 символов
          print(f"\n--- HTML head ---\n{html[:3000]}")
          PYEOF

      - name: Run monitor
        run: python3 lab_monitor.py

      - name: Disconnect VPN
        if: always()
        run: sudo pkill openvpn || true

      - name: Save seen promos
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen_promos.json || true
          git diff --staged --quiet && echo "nothing to commit" && exit 0
          git commit -m "update seen_promos"
          git push
