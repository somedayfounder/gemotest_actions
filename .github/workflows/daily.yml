name: daily-lab-monitor

on:
  schedule:
    - cron: '0 7 * * *'   # 09:00 московское время
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write TG + OpenAI config
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 -c "
import json, os
open('tg_config_labs.json','w').write(json.dumps({
    'token': os.environ['TG_TOKEN'],
    'chat_id': int(os.environ['TG_CHAT_ID'])
}))
"

      - name: Run monitor
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python3 lab_monitor.py

      - name: Save seen promos
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen_promos.json || true
          git diff --staged --quiet || git commit -m "update seen_promos"
          git push || true
